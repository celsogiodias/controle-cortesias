<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Controle de Cortesias</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); min-height: 100vh; }
        .login-card { max-width: 380px; border-radius: 16px; }
    </style>
</head>
<body>
    <div class="container d-flex justify-content-center align-items-center min-vh-100">
        <div class="card login-card shadow-lg p-4 w-100">
            <div class="text-center mb-4">
                <i class="fas fa-ticket-alt fa-3x text-primary mb-2"></i>
                <h4 class="fw-bold">Controle de Cortesias</h4>
                <p class="text-muted small">Faça login para acessar o sistema</p>
            </div>
            
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }} small">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}
            
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label small fw-bold">Usuário</label>
                    <input type="text" class="form-control" name="username" required placeholder="admin">
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-bold">Senha</label>
                    <input type="password" class="form-control" name="password" required placeholder="admin123">
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">
                    <i class="fas fa-sign-in-alt me-2"></i>Entrar
                </button>
            </form>
        </div>
    </div>
</body>
</html>
